default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: comments_app_development

test:
  <<: *default
  database: comments_app_test

production:
  primary: &primary_production
    <<: *default
    database: comments_app_production
  cache:
    <<: *primary_production
    database: comments_app_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: comments_app_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: comments_app_production_cable
    migrations_paths: db/cable_migrate
